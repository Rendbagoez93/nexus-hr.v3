# =============================================================================
# Nexus HR — Local Development Services
# =============================================================================
# Starts all backing services needed to run the Django app locally.
# The Django process itself runs outside Docker (manage.py runserver or uvicorn)
# and connects to these containers via localhost.
#
# Usage:
#   docker compose up -d          # start all services in background
#   docker compose down           # stop and remove containers (data volumes persist)
#   docker compose down -v        # stop and also delete all volumes (full reset)
#   docker compose logs -f        # tail all service logs
#
# After first start, create the database:
#   docker compose exec postgres psql -U postgres -c "CREATE DATABASE nexus_hr;"
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary database
  # Host port 5433 avoids conflict with any locally-installed PostgreSQL
  # instance that may already be listening on 5432.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus_hr
      # Use a UTF-8 locale that matches Django's default.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_hr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — cache, session store, and Celery broker
  # Uncomment when you need background tasks or caching.
  # DB 0 → cache / sessions  (REDIS_URL)
  # DB 1 → Celery broker     (CELERY_BROKER_URL)
  # ---------------------------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   container_name: nexus_redis
  #   restart: unless-stopped
  #   command: redis-server --save 60 1 --loglevel warning
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
