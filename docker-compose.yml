  # ---------------------------------------------------------------------------
  # MailHog — catches all outbound SMTP email in local dev.
  # SMTP:    localhost:1025  (EMAIL_HOST / EMAIL_PORT in .env)
  # Web UI:  http://localhost:8025
  # ---------------------------------------------------------------------------
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   container_name: nexus_mailhog
  #   restart: unless-stopped
  #   ports:
  #     - "1025:1025"   # SMTP
  #     - "8025:8025"   # Web UI

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for local file upload testing.
  # Enable in .env: USE_S3_STORAGE=True, AWS_S3_ENDPOINT_URL=http://localhost:9000
  # Console: http://localhost:9001  (minioadmin / minioadmin)
  # API:     http://localhost:9000
  # ---------------------------------------------------------------------------
  # minio:
  #   image: minio/minio:latest
  #   container_name: nexus_minio
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   ports:
  #     - "9000:9000"   # S3 API
  #     - "9001:9001"   # Web console
  #   volumes:
  #     - minio_data:/data
  #   healthcheck:
  #     test: ["CMD", "mc", "ready", "local"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO bucket initialisation — runs once and exits.
  # Creates the `nexus-media` bucket with private access policy.
  # ---------------------------------------------------------------------------
  # minio_init:
  #   image: minio/mc:latest
  #   container_name: nexus_minio_init
  #   depends_on:
  #     minio:
  #       condition: service_healthy
  #   entrypoint: >
  #     /bin/sh -c "
  #       mc alias set local http://minio:9000 minioadmin minioadmin;
  #       mc mb --ignore-existing local/nexus-media;
  #       mc anonymous set none local/nexus-media;
  #       echo 'MinIO bucket nexus-media ready.';
  #     "
  #   restart: "no"


# =============================================================================
# Named volumes — data survives container restarts; wiped only by `down -v`.
# =============================================================================
volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local
  # minio_data:
  #   driver: local
